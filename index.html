<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Voting Game</title>
<style>
body{font-family:Arial,sans-serif;max-width:800px;margin:auto;padding:20px}
button,input{padding:10px;margin:5px}
#players div{padding:4px}
</style>
</head>
<body>
<h1>Friends Voting Game</h1>

<p>Replace the Firebase config below with your own if needed.</p>

<input id="name" placeholder="Your name">
<button onclick="joinGame()">Join</button>

<h2>Players</h2>
<div id="players"></div>

<button onclick="startVote()">Start</button>
<div id="startStatus"></div>

<button onclick="voteMode()">Vote Mode</button>
<div id="voteStatus"></div>

<button onclick="endVote()">End Game</button>
<div id="endStatus"></div>

<h2 id="status">Waiting...</h2>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBtbS-PKn6KHYxv5C5oxbnW6qyq7tNjIUo",
  authDomain: "imporstor-77552.firebaseapp.com",
  databaseURL: "https://imporstor-77552-default-rtdb.firebaseio.com",
  projectId: "imporstor-77552",
  storageBucket: "imporstor-77552.firebasestorage.app",
  messagingSenderId: "988501455649",
  appId: "1:988501455649:web:cb1004d35d3c0af05c4460",
  measurementId: "G-Z99981M72P"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let playerName = "";

window.joinGame = async function () {
  playerName = document.getElementById("name").value.trim();
  if (!playerName) return;
  await set(ref(db, "room/players/" + playerName), { name: playerName });
};

window.startVote = async function () {
  if (!playerName) return;
  await set(ref(db, "room/startVotes/" + playerName), true);
};

window.voteMode = async function () {
  if (!playerName) return;
  await set(ref(db, "room/voteModeVotes/" + playerName), true);
};

window.endVote = async function () {
  if (!playerName) return;
  await set(ref(db, "room/endVotes/" + playerName), true);
};

function majority(n){
  return Math.floor(n/2)+1;
}

onValue(ref(db,"room"), snap => {
  const room = snap.val() || {};
  const players = room.players ? Object.values(room.players) : [];

  document.getElementById("players").innerHTML =
    players.map(p => `<div>${p.name}</div>`).join("");

  const total = players.length;

  const starts = room.startVotes ? Object.keys(room.startVotes).length : 0;
  document.getElementById("startStatus").textContent =
    `${starts}/${total} started`;

  const votes = room.voteModeVotes ? Object.keys(room.voteModeVotes).length : 0;
  document.getElementById("voteStatus").textContent =
    `${votes}/${majority(Math.max(total,1))} needed`;

  const ends = room.endVotes ? Object.keys(room.endVotes).length : 0;
  document.getElementById("endStatus").textContent =
    `${ends}/${majority(Math.max(total,1))} needed`;

  let status = "Waiting...";

  if (total > 0 && starts === total) status = "Game Started!";
  if (votes >= majority(Math.max(total,1))) status = "Voting Mode Active!";
  if (ends >= majority(Math.max(total,1))) status = "Game Ended!";

  document.getElementById("status").textContent = status;
});
</script>
</body>
</html>
