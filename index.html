<!DOCTYPE html>
<html>
<head>
    <title>Impostor Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
        }
        #card {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>

<h1>Impostor Game</h1>

<label>Players:</label>
<input type="number" id="players" value="5" min="3">

<button onclick="startGame()">Start Game</button>
<button onclick="resetGame()">Reset</button>

<div id="card"></div>

<script>
const words = [
    "Pizza",
    "Tiger",
    "Football",
    "Castle",
    "Rocket"
];

let currentPlayer = 0;
let totalPlayers = 0;
let impostor = 0;
let word = "";

function startGame() {
    totalPlayers = Number(document.getElementById("players").value);
    currentPlayer = 1;
    impostor = Math.floor(Math.random() * totalPlayers) + 1;
    word = words[Math.floor(Math.random() * words.length)];

    showPlayer();
}

function showPlayer() {
    const card = document.getElementById("card");

    if (currentPlayer > totalPlayers) {
        card.innerHTML = "Everyone has seen their role!";
        return;
    }

    let text =
        currentPlayer === impostor
        ? "You are the IMPOSTOR!"
        : "Word: " + word;

    card.innerHTML = `
        <h2>Player ${currentPlayer}</h2>
        <p>${text}</p>
        <button onclick="nextPlayer()">Next Player</button>
    `;
}

function nextPlayer() {
    currentPlayer++;
    showPlayer();
}

function resetGame() {
    document.getElementById("card").innerHTML = "";
}
</script>

</body>
</html>
